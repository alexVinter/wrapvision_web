<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Wrap Vision{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400..700;1,9..40,400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ request.url_for('static', path='css/style.css') }}?v=28">
  {% block head_extra %}{% endblock %}
</head>
<body class="ds-page {% block body_class %}{% endblock %}">
  {% block content %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
